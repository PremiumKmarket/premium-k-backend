<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium K · 관리자</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#F4F5F7;margin:0;padding:16px;color:#1C2333;}
h1{font-size:18px;color:#0B1B33;}
.card{background:#fff;border:1px solid #E2E5EA;border-radius:12px;padding:14px;margin-bottom:12px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{text-align:left;padding:8px;border-bottom:1px solid #E2E5EA;}
button{background:#0B1B33;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;}
button.danger{background:#B3261E;}
input{border:1px solid #E2E5EA;border-radius:8px;padding:8px;font-size:14px;width:100%;margin-bottom:8px;box-sizing:border-box;}
.pill{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;}
.pill.approved{background:#E7F6EC;color:#1E7A46;}
.pill.pending{background:#FFF3E9;color:#8A4B00;}
#loginBox{max-width:320px;margin:60px auto;}
.pager{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px;}
.pager button{padding:5px 12px;font-size:12px;}
.pager button:disabled{opacity:0.35;cursor:default;}
.pager span{font-size:12px;color:#5B6272;}
</style>
</head>
<body>

<div id="loginBox" class="card">
  <h1>관리자 로그인</h1>
  <input id="phone" placeholder="휴대폰 번호">
  <input id="password" type="password" maxlength="6" placeholder="비밀번호 6자리">
  <button onclick="adminLogin()" style="width:100%;padding:10px;">로그인</button>
  <div id="loginErr" style="color:#B3261E;font-size:12px;margin-top:8px;"></div>
</div>

<div id="dashboard" style="display:none;">
  <h1>Premium K 관리자</h1>
  <div class="card">
    <a href="catalog.html" style="text-decoration:none;"><button>Manage Products 상품 관리 (가격/사진/추가) →</button></a>
  </div>

  <div class="card">
    <h2 style="font-size:14px;">회원 승인 관리</h2>
    <table id="userTable"><thead><tr><th>전화번호</th><th>이메일</th><th>상호명</th><th>주소</th><th>담당영업사원</th><th>등급</th><th>상태</th><th>가입일</th><th></th></tr></thead><tbody></tbody></table>
    <div class="pager" id="userPager"></div>
  </div>

  <div class="card">
    <h2 style="font-size:14px;">고객별 행동 조회</h2>
    <input id="insightPhone" placeholder="전화번호로 검색 (숫자만)">
    <button onclick="loadInsights()">조회</button>
    <table id="insightTable" style="margin-top:10px;"><thead><tr><th>시각</th><th>행동</th><th>상품</th><th>상세</th></tr></thead><tbody></tbody></table>
  </div>

  <div class="card">
    <h2 style="font-size:14px;">최근 30일 인기 상품 (조회/장바구니 기준)</h2>
    <table id="topSkuTable"><thead><tr><th>SKU</th><th>행동</th><th>횟수</th></tr></thead><tbody></tbody></table>
    <div class="pager" id="topSkuPager"></div>
  </div>

  <div class="card">
    <h2 style="font-size:14px;">최근 30일 활발한 고객</h2>
    <table id="activeUserTable"><thead><tr><th>전화번호</th><th>활동수</th><th>마지막 접속</th></tr></thead><tbody></tbody></table>
    <div class="pager" id="activeUserPager"></div>
  </div>

  <div class="card">
    <h2 style="font-size:14px;">영업사원별 매출 / 인센티브 (5%)</h2>
    <select id="repSalesMonth" onchange="renderRepSalesTable()" style="margin-bottom:8px;"></select>
    <table id="repSalesTable"><thead><tr><th>영업사원</th><th>주문건수</th><th>총 매출</th><th>인센티브 (5%)</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<script>
// ⚠️ 이 값을 실제 백엔드 주소로 바꿔주세요 (tronic_field_order.html의 BACKEND_API_URL과 동일해야 합니다)
const API_BASE = 'https://premium-k-backend.vercel.app/api';

let token = localStorage.getItem('pk_token');

// 고객이 직접 입력하는 값(이메일/상호명/주소/영업사원명/SKU 등)을 화면에 그대로 꽂아 넣으면
// 악성 스크립트가 실행될 수 있어(저장형 XSS), 화면에 표시하기 전에 반드시 이 함수로 이스케이프합니다.
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers||{}) };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, { ...options, headers });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.message || data.error || 'Request failed');
  return data;
}

async function adminLogin() {
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value.trim();
  try {
    const data = await api('/auth/login', { method:'POST', body: JSON.stringify({ phone, password }) });
    if (!data.isAdmin) { document.getElementById('loginErr').textContent = '관리자 계정이 아닙니다.'; return; }
    token = data.token;
    localStorage.setItem('pk_token', token);
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadUsers();
    loadInsights();
  } catch (e) {
    document.getElementById('loginErr').textContent = e.message;
  }
}

const PAGE_SIZE = 10;
const pageState = { user: 1, topSku: 1, activeUser: 1 };
let allUsers = [], allTopSkus = [], allActiveUsers = [];

function renderPager(pagerId, dataLen, key, onChangeFn) {
  const totalPages = Math.max(1, Math.ceil(dataLen / PAGE_SIZE));
  if (pageState[key] > totalPages) pageState[key] = totalPages;
  const cur = pageState[key];
  document.getElementById(pagerId).innerHTML = `
    <button ${cur<=1?'disabled':''} onclick="${onChangeFn}(${cur-1})">‹ 이전</button>
    <span>${cur} / ${totalPages} (총 ${dataLen}개)</span>
    <button ${cur>=totalPages?'disabled':''} onclick="${onChangeFn}(${cur+1})">다음 ›</button>
  `;
}

function goUserPage(p){ pageState.user = p; renderUserTable(); }

const TIER_LABELS = { tier1: 'Tier 1', tier2: 'Tier 2', tier3: 'Tier 3' };

function tierSelectHtml(u) {
  const current = u.tier || 'tier3';
  const options = ['tier1', 'tier2', 'tier3'].map(t =>
    `<option value="${t}" ${t === current ? 'selected' : ''}>${TIER_LABELS[t]}</option>`
  ).join('');
  if (u.approved) {
    // 이미 승인된 고객: 등급을 바꾸면 확인창이 뜨고, 확인해야만 실제로 저장됨
    return `<select onchange="confirmTierChange('${u.id}', this)">${options}</select>`;
  }
  // 승인 대기중: 승인 버튼을 누를 때 이 선택값으로 등급이 함께 저장됨 (기본 Tier 3)
  return `<select id="tierSelect-${u.id}">${options}</select>`;
}

function renderUserTable(){
  const start = (pageState.user-1)*PAGE_SIZE;
  const tbody = document.querySelector('#userTable tbody');
  tbody.innerHTML = allUsers.slice(start, start+PAGE_SIZE).map(u => `
    <tr>
      <td>${escapeHtml(u.phone)}</td><td>${escapeHtml(u.email)||'—'}</td><td>${escapeHtml(u.company_name)||'—'}</td><td>${escapeHtml(u.address)||'—'}</td>
      <td>${escapeHtml(u.rep_name)||'—'}</td>
      <td>${tierSelectHtml(u)}</td>
      <td><span class="pill ${u.approved?'approved':'pending'}">${u.approved?'승인됨':'대기중'}</span></td>
      <td>${new Date(u.created_at).toLocaleDateString('ko-KR')}</td>
      <td style="white-space:nowrap;">
        ${u.approved
          ? `<button class="danger" onclick="setApproved('${u.id}',false)">승인취소</button>`
          : `<button onclick="setApproved('${u.id}',true,document.getElementById('tierSelect-${u.id}').value)">승인</button>`}
        <button onclick="resetPassword('${u.id}','${u.phone}')" style="margin-left:6px;">비번재설정</button>
        <button class="danger" onclick="deleteUser('${u.id}','${u.phone}')" style="margin-left:6px;">삭제</button>
      </td>
    </tr>`).join('');
  renderPager('userPager', allUsers.length, 'user', 'goUserPage');
}

async function loadUsers() {
  const data = await api('/admin/users');
  allUsers = data.users;
  pageState.user = 1;
  renderUserTable();
}

async function setApproved(userId, approved, tier) {
  const body = { userId, approved };
  if (approved && tier) body.tier = tier;
  await api('/admin/users', { method:'POST', body: JSON.stringify(body) });
  loadUsers();
}

// 등급 드롭다운을 바꾸면 바로 저장하지 않고, 어떤 고객을 어느 등급으로
// 바꾸는지 확인창을 띄웁니다. 취소하면 드롭다운을 원래 값으로 되돌립니다.
// (여러 명을 한 번에 바꿀 때 실수로 잘못 누르는 걸 막기 위함)
function confirmTierChange(userId, selectEl) {
  const newTier = selectEl.value;
  const user = allUsers.find(u => u.id === userId);
  const prevTier = user ? (user.tier || 'tier3') : newTier;
  if (newTier === prevTier) return;

  const who = user ? (user.company_name ? `${user.phone} (${user.company_name})` : user.phone) : userId;
  const ok = confirm(
    `${who} 고객을 ${TIER_LABELS[prevTier]} → ${TIER_LABELS[newTier]} 로 변경하시겠습니까?\n\n확인을 누르면 즉시 적용됩니다.`
  );
  if (!ok) {
    selectEl.value = prevTier; // 취소하면 원래 값으로 되돌림
    return;
  }
  changeTier(userId, newTier);
}

async function changeTier(userId, tier) {
  try {
    await api('/admin/users', { method:'POST', body: JSON.stringify({ userId, tier }) });
    loadUsers();
  } catch (e) {
    alert('등급 변경 실패: ' + e.message);
    loadUsers();
  }
}

async function resetPassword(userId, phone) {
  // 6자리 임시 비밀번호를 자동으로 만들어서, 관리자가 바로 고객에게 전달할 수 있게 합니다.
  const autoPassword = String(Math.floor(100000 + Math.random() * 900000));
  const newPassword = prompt(
    `${phone} 고객의 새 비밀번호(숫자 6자리)를 입력하세요.\n그냥 확인만 누르면 자동 생성된 번호로 설정됩니다.`,
    autoPassword
  );
  if (newPassword === null) return; // 취소
  if (!/^[0-9]{6}$/.test(newPassword)) { alert('비밀번호는 숫자 6자리여야 합니다.'); return; }

  try {
    await api('/admin/users', { method:'POST', body: JSON.stringify({ userId, newPassword }) });
    alert(`비밀번호가 재설정되었습니다.\n\n고객 번호: ${phone}\n새 비밀번호: ${newPassword}\n\n이 번호를 고객에게 전화나 문자로 전달해주세요.`);
  } catch (e) {
    alert(e.message);
  }
}

async function deleteUser(userId, phone) {
  if (!confirm(`${phone} 계정을 완전히 삭제할까요? 이 작업은 되돌릴 수 없습니다.`)) return;
  try {
    await api('/admin/users', { method:'DELETE', body: JSON.stringify({ userId }) });
    loadUsers();
  } catch (e) {
    alert(e.message);
  }
}

let salesByRepMonthData = [];

function goTopSkuPage(p){ pageState.topSku = p; renderTopSkuTable(); }
function renderTopSkuTable(){
  const start = (pageState.topSku-1)*PAGE_SIZE;
  document.querySelector('#topSkuTable tbody').innerHTML = allTopSkus.slice(start, start+PAGE_SIZE).map(r => `
    <tr><td>${escapeHtml(r.sku)}</td><td>${escapeHtml(r.event_type)}</td><td>${r.n}</td></tr>
  `).join('');
  renderPager('topSkuPager', allTopSkus.length, 'topSku', 'goTopSkuPage');
}

function goActiveUserPage(p){ pageState.activeUser = p; renderActiveUserTable(); }
function renderActiveUserTable(){
  const start = (pageState.activeUser-1)*PAGE_SIZE;
  document.querySelector('#activeUserTable tbody').innerHTML = allActiveUsers.slice(start, start+PAGE_SIZE).map(r => `
    <tr><td>${r.phone}</td><td>${r.events}</td><td>${new Date(r.last_seen).toLocaleString('ko-KR')}</td></tr>
  `).join('');
  renderPager('activeUserPager', allActiveUsers.length, 'activeUser', 'goActiveUserPage');
}

async function loadInsights() {
  const phone = document.getElementById('insightPhone').value.trim();
  const data = await api('/admin/insights' + (phone ? `?phone=${encodeURIComponent(phone)}` : ''));
  if (data.events) {
    document.querySelector('#insightTable tbody').innerHTML = data.events.map(e => `
      <tr><td>${new Date(e.created_at).toLocaleString('ko-KR')}</td><td>${escapeHtml(e.event_type)}</td><td>${escapeHtml(e.sku)||'—'}</td><td>${e.detail?escapeHtml(JSON.stringify(e.detail)):'—'}</td></tr>
    `).join('');
  }
  if (data.topSkus) {
    allTopSkus = data.topSkus;
    pageState.topSku = 1;
    renderTopSkuTable();
  }
  if (data.activeUsers) {
    allActiveUsers = data.activeUsers;
    pageState.activeUser = 1;
    renderActiveUserTable();
  }
  if (data.salesByRepMonth) {
    salesByRepMonthData = data.salesByRepMonth;
    const months = [...new Set(salesByRepMonthData.map(r => r.month))].sort().reverse();
    const sel = document.getElementById('repSalesMonth');
    const cur = sel.value;
    sel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
    if (months.includes(cur)) sel.value = cur;
    renderRepSalesTable();
  }
}

function renderRepSalesTable() {
  const month = document.getElementById('repSalesMonth').value;
  const rows = salesByRepMonthData.filter(r => r.month === month);
  const tbody = document.querySelector('#repSalesTable tbody');
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="4">해당 월 주문 없음</td></tr>'; return; }
  tbody.innerHTML = rows.map(r => `
    <tr><td>${escapeHtml(r.repName)}</td><td>${r.orderCount}</td><td>$${r.totalSales.toFixed(2)}</td><td style="color:var(--green,#1E7A46);font-weight:700;">$${r.incentive.toFixed(2)}</td></tr>
  `).join('');
  const monthTotal = rows.reduce((s,r)=>s+r.totalSales,0);
  const monthIncentive = rows.reduce((s,r)=>s+r.incentive,0);
  tbody.innerHTML += `<tr style="font-weight:700;border-top:2px solid #0B1B33;"><td>합계 Total</td><td>${rows.reduce((s,r)=>s+r.orderCount,0)}</td><td>$${monthTotal.toFixed(2)}</td><td>$${monthIncentive.toFixed(2)}</td></tr>`;
}

if (token) {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadUsers().catch(()=>{ localStorage.removeItem('pk_token'); location.reload(); });
  loadInsights();
}
</script>
</body>
</html>
