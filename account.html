<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Premium K · 내 계정 My Account</title>
<style>
:root{
  --navy:#0B1B33; --orange:#E05D00; --bg:#F4F5F7; --card:#FFFFFF;
  --line:#E2E5EA; --text:#1C2333; --text-2:#5B6272; --green:#1E7A46; --red:#B3261E;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);margin:0;padding:0;color:var(--text);padding-bottom:40px;}
.brand{background:linear-gradient(180deg,var(--navy),#132749);padding:16px 18px;position:sticky;top:0;z-index:10;}
.brand .title{color:#fff;font-size:16px;font-weight:700;}
.brand .sub{color:#B9C2D6;font-size:12px;margin-top:2px;}
.wrap{padding:14px 16px;max-width:640px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
h2{font-size:14px;color:var(--navy);margin:0 0 12px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:4px;}
input, textarea{border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:14px;width:100%;box-sizing:border-box;font-family:inherit;}
textarea{min-height:56px;resize:vertical;}
button{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;}
button.secondary{background:var(--bg);color:var(--navy);border:1px solid var(--line);}
button.danger{background:var(--red);}
button.small{padding:6px 10px;font-size:11.5px;}
.msg{font-size:12px;margin-top:8px;}
.msg.err{color:var(--red);}
.msg.ok{color:var(--green);}
.addr-item{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.addr-item .pill{font-size:10px;font-weight:700;color:var(--orange);border:1px solid var(--orange);border-radius:999px;padding:1px 7px;margin-left:6px;}
.order-item{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;font-size:13px;}
.order-item .meta{color:var(--text-2);font-size:11.5px;margin-top:2px;}
.order-item pre{white-space:pre-wrap;font-size:11.5px;background:var(--bg);border-radius:8px;padding:8px;margin-top:8px;max-height:200px;overflow-y:auto;display:none;}
a.linklike{color:var(--navy);font-size:12px;font-weight:700;text-decoration:underline;cursor:pointer;}
#loginGate{max-width:320px;margin:60px auto;text-align:center;}
</style>
</head>
<body>

<div class="brand">
  <div class="title">Premium K · 내 계정 My Account</div>
  <div class="sub" id="whoami"></div>
  <div style="margin-top:8px;">
    <a href="#" onclick="goBackToShop();return false;" style="color:#fff;font-size:12.5px;font-weight:700;text-decoration:underline;">← Back to Shopping 상품 주문하러 가기</a>
  </div>
</div>

<div id="loginGate" class="card" style="display:none;">
  <h2 style="text-align:center;">Login required 로그인이 필요합니다</h2>
  <div class="field"><label>Phone Number 휴대폰 번호</label><input id="lgPhone" placeholder="213-000-0000"></div>
  <div class="field"><label>비밀번호 Password (6 digits)</label><input id="lgPassword" type="password" maxlength="6" inputmode="numeric" placeholder="••••••"></div>
  <button style="width:100%;" onclick="doLogin()">Login 로그인</button>
  <div id="loginMsg" class="msg"></div>
  <div style="margin-top:10px;"><a class="linklike" onclick="toggleForgot()">Forgot password? 비밀번호를 잊으셨나요?</a></div>
  <div id="forgotBox" style="display:none;margin-top:10px;">
    <input id="forgotPhone" placeholder="Registered phone number 가입한 휴대폰번호">
    <button class="secondary" style="width:100%;margin-top:8px;" onclick="requestReset()">Send Reset Email 재설정 이메일 받기</button>
    <div id="forgotMsg" class="msg"></div>
  </div>
</div>

<div class="wrap" id="mainContent" style="display:none;">

  <div class="card">
    <h2>Profile 내 정보</h2>
    <div class="field"><label>Phone 휴대폰 번호</label><input id="profPhone" disabled></div>
    <div class="field"><label>Email 이메일</label><input id="profEmail" disabled></div>
    <div class="field"><label>Company 상호명</label><input id="profCompany" disabled></div>
    <div class="field"><label>Status 상태</label><input id="profStatus" disabled></div>
  </div>

  <div class="card">
    <h2>Change Password 비밀번호 변경</h2>
    <div class="field"><label>Current Password 현재 비밀번호</label><input id="curPw" type="password" maxlength="6" inputmode="numeric"></div>
    <div class="field"><label>New Password (6 digits) 새 비밀번호</label><input id="newPw" type="password" maxlength="6" inputmode="numeric"></div>
    <button onclick="changePassword()">Update 변경</button>
    <div id="pwMsg" class="msg"></div>
  </div>

  <div class="card">
    <h2>Shipping Addresses 배송 주소 관리 <span style="font-weight:400;color:var(--text-2);font-size:11.5px;">— add one per store location / 매장이 여러 개면 각각 등록해두세요</span></h2>
    <div id="addrList"></div>
    <div class="field" style="margin-top:10px;"><label>Label (e.g. Main Store, Branch 2) 주소 이름</label><input id="newAddrLabel" placeholder="Main Store 예: 본점"></div>
    <div class="field"><label>Address 주소</label><textarea id="newAddrText" placeholder="123 Main St, Los Angeles, CA 90001"></textarea></div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);margin-bottom:8px;">
      <input type="checkbox" id="newAddrDefault" style="width:auto;"> Set as default 기본 주소로 설정
    </label>
    <button onclick="addAddress()">Add Address 주소 추가</button>
    <div id="addrMsg" class="msg"></div>
  </div>

  <div class="card">
    <h2>Order History 주문 내역</h2>
    <div id="orderList"></div>
  </div>

  <div style="text-align:center;">
    <button class="secondary" onclick="logout()">Logout 로그아웃</button>
  </div>
</div>

<script>
const API_BASE = 'https://premium-k-backend.vercel.app/api';
let token = localStorage.getItem('pk_token');
let authUser = JSON.parse(localStorage.getItem('pk_user') || 'null');

async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers||{}) };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, { ...options, headers });
  if (res.status === 204) return {};
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.message || data.error || 'Request failed');
  return data;
}

function toggleForgot(){
  const box = document.getElementById('forgotBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

async function requestReset(){
  const phone = document.getElementById('forgotPhone').value.trim();
  const msgEl = document.getElementById('forgotMsg');
  msgEl.className = 'msg';
  try {
    const data = await api('/auth/reset', { method:'POST', body: JSON.stringify({ action: 'request', phone }) });
    msgEl.className = 'msg ok';
    msgEl.textContent = data.message;
  } catch (e) {
    msgEl.className = 'msg err';
    msgEl.textContent = e.message;
  }
}

async function doLogin(){
  const phone = document.getElementById('lgPhone').value.trim();
  const password = document.getElementById('lgPassword').value.trim();
  const msgEl = document.getElementById('loginMsg');
  msgEl.className = 'msg';
  try {
    const data = await api('/auth/login', { method:'POST', body: JSON.stringify({ phone, password }) });
    token = data.token;
    authUser = { phone: phone.replace(/[^0-9]/g,''), approved: data.approved, email: data.email, companyName: data.companyName, isAdmin: data.isAdmin };
    localStorage.setItem('pk_token', token);
    localStorage.setItem('pk_user', JSON.stringify(authUser));
    init();
  } catch (e) {
    msgEl.className = 'msg err';
    msgEl.textContent = e.message;
  }
}

function goBackToShop(){
  if (history.length > 1) {
    history.back();
  } else {
    alert('상품 주문 화면(Site_Order 파일)을 직접 열어주세요.\nPlease open the Site_Order file directly to shop.');
  }
}

function logout(){
  localStorage.removeItem('pk_token');
  localStorage.removeItem('pk_user');
  location.reload();
}

async function loadProfile(){
  document.getElementById('profPhone').value = authUser.phone || '';
  document.getElementById('profEmail').value = authUser.email || '—';
  document.getElementById('profCompany').value = authUser.companyName || '—';
  document.getElementById('profStatus').value = authUser.approved ? 'Approved 승인됨' : 'Pending approval 승인 대기중';
  document.getElementById('whoami').textContent = `${authUser.phone}님 ${authUser.isAdmin ? '(Admin 관리자)' : ''}`;
}

async function changePassword(){
  const currentPassword = document.getElementById('curPw').value.trim();
  const newPassword = document.getElementById('newPw').value.trim();
  const msgEl = document.getElementById('pwMsg');
  msgEl.className = 'msg';
  try {
    const data = await api('/account?resource=password', { method:'POST', body: JSON.stringify({ currentPassword, newPassword }) });
    msgEl.className = 'msg ok';
    msgEl.textContent = data.message;
    document.getElementById('curPw').value = '';
    document.getElementById('newPw').value = '';
  } catch (e) {
    msgEl.className = 'msg err';
    msgEl.textContent = e.message;
  }
}

async function loadAddresses(){
  const data = await api('/account?resource=addresses');
  const el = document.getElementById('addrList');
  if (!data.addresses.length) { el.innerHTML = '<div style="font-size:12.5px;color:var(--text-2);">No saved addresses yet. 등록된 주소가 없습니다.</div>'; return; }
  el.innerHTML = data.addresses.map(a => `
    <div class="addr-item">
      <div>
        <div style="font-weight:600;">${a.label || '주소 Address'}${a.is_default ? '<span class="pill">Default 기본</span>' : ''}</div>
        <div style="color:var(--text-2);font-size:12.5px;margin-top:2px;">${a.address}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
        ${!a.is_default ? `<button class="secondary small" onclick="setDefaultAddress('${a.id}')">Set default 기본으로</button>` : ''}
        <button class="danger small" onclick="deleteAddress('${a.id}')">Delete 삭제</button>
      </div>
    </div>
  `).join('');
}

async function addAddress(){
  const label = document.getElementById('newAddrLabel').value.trim();
  const address = document.getElementById('newAddrText').value.trim();
  const isDefault = document.getElementById('newAddrDefault').checked;
  const msgEl = document.getElementById('addrMsg');
  msgEl.className = 'msg';
  try {
    await api('/account?resource=addresses', { method:'POST', body: JSON.stringify({ label, address, isDefault }) });
    document.getElementById('newAddrLabel').value = '';
    document.getElementById('newAddrText').value = '';
    document.getElementById('newAddrDefault').checked = false;
    msgEl.className = 'msg ok';
    msgEl.textContent = 'Address added. 주소가 추가되었습니다.';
    loadAddresses();
  } catch (e) {
    msgEl.className = 'msg err';
    msgEl.textContent = e.message;
  }
}

async function setDefaultAddress(id){
  await api('/account?resource=addresses', { method:'PATCH', body: JSON.stringify({ id, isDefault: true }) });
  loadAddresses();
}

async function deleteAddress(id){
  if (!confirm('Delete this address? 이 주소를 삭제할까요?')) return;
  await api('/account?resource=addresses', { method:'DELETE', body: JSON.stringify({ id }) });
  loadAddresses();
}

async function loadOrders(){
  const data = await api('/orders');
  const el = document.getElementById('orderList');
  if (!data.orders.length) { el.innerHTML = '<div style="font-size:12.5px;color:var(--text-2);">No orders yet. 아직 주문 내역이 없습니다.</div>'; return; }
  el.innerHTML = data.orders.map((o, idx) => `
    <div class="order-item">
      <div style="display:flex;justify-content:space-between;">
        <span style="font-weight:700;">$${Number(o.total).toFixed(2)}</span>
        <span class="meta">${new Date(o.created_at).toLocaleString('ko-KR')}</span>
      </div>
      <div class="meta">Invoice No. 인보이스 번호: ${o.invoice_number || '—'}</div>
      <div class="meta">Fulfillment 수령방법 ${o.delivery_method || '—'} · Payment 결제방법 ${o.payment_method || '—'}</div>
      <a class="linklike"
